# Read the Docs build configuration for rustmatrix.
# Reference: https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
    rust: "1.82"
  jobs:
    post_install:
      # The maturin build backend (configured in pyproject.toml) compiles
      # the Rust extension as part of the editable install, so no separate
      # `maturin develop` step is needed here.
      - pip install -e ".[docs]"

sphinx:
  configuration: docs/conf.py
  builder: html
  fail_on_warning: false

formats:
  - htmlzip
