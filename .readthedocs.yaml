# Read the Docs build configuration for rustmatrix.
# Reference: https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
    rust: "1.82"
  jobs:
    post_install:
      # Non-editable install: maturin (the build backend) compiles the
      # Rust extension into a real wheel. An editable install here would
      # produce only a .pth shim with no compiled _core module.
      - pip install ".[docs]"

sphinx:
  configuration: docs/conf.py
  builder: html
  fail_on_warning: false

formats:
  - htmlzip
